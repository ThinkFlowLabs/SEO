<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<title>ThinkFlowLabs · SEO Audits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,30..100,0..1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --coral: #E63946; --ink: #0E1014; --cream: #FBF6EB; --muted: #5E6675; --line: #E6DFD2; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: "Inter", system-ui, sans-serif; color: var(--ink); background: var(--cream); min-height: 100vh; display: grid; place-items: center; padding: 32px; }
  .wrap { max-width: 640px; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: var(--coral); margin-bottom: 24px; }
  h1 { font-family: "Fraunces", serif; font-weight: 400; font-size: clamp(40px, 6vw, 64px); letter-spacing: -.022em; line-height: 1.05; margin: 0 0 16px; }
  h1 em { font-style: italic; color: var(--coral); font-variation-settings: "SOFT" 100, "WONK" 1; }
  p { font-size: 17px; color: #1F2630; line-height: 1.6; margin: 0 0 24px; }
  ul { list-style: none; padding: 0; margin: 32px 0 0; }
  li { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 22px 26px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 16px; transition: box-shadow .2s ease; }
  li:hover { box-shadow: 0 14px 38px -22px rgba(60,40,18,.32); }
  li b { font-size: 17px; }
  li small { color: var(--muted); font-size: 13px; }
  a.btn { display: inline-block; padding: 10px 18px; background: var(--coral); color: white; text-decoration: none; border-radius: 999px; font-weight: 600; font-size: 14px; }
  a.btn:hover { background: #C92C3F; }
  footer { margin-top: 48px; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">ThinkFlowLabs · Client Deliverables</div>
    <h1>SEO <em>audits</em> &amp; growth strategy.</h1>
    <p>Confidential client engagements. Direct links below. This index is excluded from search engines.</p>
    <ul>
      <li>
        <div><b>Chefpost.com</b><br><small>SEO Audit &amp; Growth Strategy · May 2026</small></div>
        <a class="btn" href="./chefpost-audit/">Open report →</a>
      </li>
    </ul>
    <footer>
      © ThinkFlowLabs · <a href="https://github.com/ThinkFlowLabs/SEO" style="color: var(--muted);">repo</a>
    </footer>
  </div>
</body>
</html>
